version: "3.9"

services:
  shared-data-permissions:
    image: busybox:1.36
    container_name: shared-data-permissions
    restart: "no"
    command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
    volumes:
      - shared_data:/data

  n8n:
    image: n8nio/n8n:latest
    container_name: nn8n
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_DIAGNOSTICS_ENABLED=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=jsdom,@mozilla/readability
      - N8N_DEFAULT_LOCALE=pt-BR
    volumes:
      - n8n_data_transcription:/home/node/.n8n
      - shared_data:/data
    depends_on:
      shared-data-permissions:
        condition: service_completed_successfully
      whisper-worker:
        condition: service_started

  whisper-worker:
    build:
      context: ./whisper-worker
      dockerfile: Dockerfile
    container_name: whisper-worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - whisper_cache:/root/.cache/whisper
      - shared_data:/data
    ports:
      - "8000:8000"
    depends_on:
      shared-data-permissions:
        condition: service_completed_successfully

volumes:
  n8n_data_transcription:
  whisper_cache:
  shared_data:
